name: CI

on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test:unit

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: xstate_dbos
          POSTGRES_PASSWORD: xstate_dbos
          POSTGRES_DB: xstate_dbos_test
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U xstate_dbos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_TEST_DATABASE_URL: postgresql://xstate_dbos:xstate_dbos@localhost:5442/xstate_dbos_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test:integration

  lint-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint:arch
