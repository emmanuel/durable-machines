name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm typecheck

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test:unit

  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: durable_xstate
          POSTGRES_PASSWORD: durable_xstate
          POSTGRES_DB: durable_xstate_test
        ports:
          - 5442:5432
        options: >-
          --health-cmd "pg_isready -U durable_xstate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_TEST_DATABASE_URL: postgresql://durable_xstate:durable_xstate@localhost:5442/durable_xstate_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm test:integration

  lint-arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm lint:arch
