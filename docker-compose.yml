services:
  postgres:
    image: postgres:17
    ports:
      - "5442:5432"
    environment:
      POSTGRES_USER: durable_machines
      POSTGRES_PASSWORD: durable_machines
      POSTGRES_DB: durable_machines_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U durable_machines -d durable_machines_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
